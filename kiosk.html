<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PSAT 문제 탐색 고도화 트레이너 — 리더스아이</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f1830;color:#1a1a1a;overflow:hidden;user-select:none}

/* ── 화면 컨테이너 ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── 공통 본문 ── */
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f3f5f9;padding:32px;overflow:auto}
.title-xl{font-size:34px;font-weight:800;color:#11203b;letter-spacing:-.5px}
.subtitle{font-size:15px;color:#7a8699;margin-top:8px}

/* ── 버튼 ── */
.btn{border:none;border-radius:12px;font-family:inherit;font-weight:700;cursor:pointer;transition:transform .08s,box-shadow .15s,background .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1a56b0;color:#fff;font-size:18px;padding:16px 40px;box-shadow:0 6px 18px rgba(26,86,176,.28)}
.btn-primary:hover{background:#164895}
.btn-primary:disabled{background:#b8c4d6;box-shadow:none;cursor:not-allowed}
.btn-ghost{background:#fff;color:#1a56b0;border:2px solid #c9d6ea;font-size:16px;padding:14px 32px}
.btn-ghost:hover{background:#f0f5ff}
.btn-lg{font-size:20px;padding:18px 52px}

/* ── 뒤로가기 (좌상단) ── */
.backbtn{position:fixed;top:14px;left:16px;z-index:120;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.94);color:#1a56b0;border:1.5px solid #c9d6ea;border-radius:10px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 10px rgba(0,0,0,.15);transition:background .12s,transform .08s}
.backbtn:hover{background:#fff}
.backbtn:active{transform:scale(.96)}
.backbtn.hidden{display:none}

/* ════ 1. 로그인 ════ */
#login{background:linear-gradient(160deg,#13234a 0%,#0f1830 100%)}
.login-wrap{margin:auto;width:100%;max-width:440px;padding:24px}
.brand{text-align:center;margin-bottom:34px}
.brand-title{font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1.3}
.brand-title .accent{color:#5b9bff}
.brand-sub{font-size:14px;color:#8ea2c4;margin-top:10px}
.login-card{background:#fff;border-radius:18px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;color:#5a6678;margin-bottom:7px}
.field input,.field select{width:100%;border:1.5px solid #dde3ec;border-radius:11px;padding:14px 16px;font-size:16px;color:#222;outline:none;background:#fff;font-family:inherit}
.field input:focus,.field select:focus{border-color:#1a56b0;box-shadow:0 0 0 3px rgba(26,86,176,.12)}
.login-card .btn-primary{width:100%;margin-top:8px}
.login-err{color:#e04848;font-size:13px;text-align:center;margin-top:12px;min-height:18px}

/* ════ 2. 기능선택 / 글선택 카드 ════ */
.text-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;width:100%;max-width:980px}
.text-card{background:#fff;border:2px solid #e6e9ef;border-radius:16px;padding:22px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .08s;display:flex;flex-direction:column;gap:12px}
.text-card:hover{border-color:#9dbce8;box-shadow:0 8px 24px rgba(26,86,176,.12);transform:translateY(-2px)}
.tc-head{display:flex;align-items:center;gap:8px}
.tc-badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px}
.tc-badge.diag{background:#e3f0ff;color:#1a56b0}
.tc-badge.train{background:#e9f7ec;color:#2e9b56}
.tc-title{font-size:18px;font-weight:800;color:#11203b}
.tc-meta{font-size:13px;color:#8492a6;line-height:1.6}
.tc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.tc-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.tc-tag.lv{background:#fef3e2;color:#a65c00}
.tc-tag.subj{background:#e8f0fe;color:#1557b0}
.tc-tag.fmt{background:#edf7f0;color:#1a6a35}
.tc-tag.qt{background:#f3eeff;color:#5b21b6}

/* ── 글 선택 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,18,38,.55);z-index:150;align-items:center;justify-content:center;padding:24px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:460px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative;text-align:center}
.modal-x{position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;background:#f0f2f6;border-radius:50%;font-size:16px;color:#7a8699;cursor:pointer;font-family:inherit}
.modal-x:hover{background:#e2e6ee;color:#333}
.modal-icon{font-size:38px;margin-bottom:8px}
.modal-badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.modal-badge.diag{background:#e3f0ff;color:#1a56b0}
.modal-badge.train{background:#e9f7ec;color:#2e9b56}
.modal-title{font-size:22px;font-weight:800;color:#11203b;margin-bottom:18px}
.modal-conds{text-align:left;background:#f6f8fc;border-radius:14px;padding:18px 20px;margin-bottom:22px;display:flex;flex-direction:column;gap:12px}
.cond-row{display:flex;align-items:flex-start;gap:12px;font-size:14px}
.cond-k{width:72px;flex-shrink:0;color:#8492a6;font-weight:600}
.cond-v{color:#2a3647;font-weight:600;line-height:1.5}
.modal .btn-primary{width:100%}

/* ════ 3. 캘리브레이션 ════ */
#calib{background:#0b1326}
.calib-stage{position:relative;flex:1;width:100%;overflow:hidden}
.calib-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5}
.calib-msg .h{font-size:28px;font-weight:800;color:#fff;margin-bottom:10px}
.calib-msg .p{font-size:16px;color:#9fb0d0;line-height:1.7}
.calib-dot{position:absolute;width:24px;height:24px;border-radius:50%;background:#5b9bff;transform:translate(-50%,-50%);box-shadow:0 0 0 0 rgba(91,155,255,.5)}
.calib-dot.live{animation:calibPulse 1.1s infinite}
.calib-dot .inner{position:absolute;inset:8px;border-radius:50%;background:#fff}
@keyframes calibPulse{0%{box-shadow:0 0 0 0 rgba(91,155,255,.55)}70%{box-shadow:0 0 0 24px rgba(91,155,255,0)}100%{box-shadow:0 0 0 0 rgba(91,155,255,0)}}
.calib-bar{padding:22px;display:flex;align-items:center;justify-content:center;gap:16px;background:#0b1326;flex-shrink:0;z-index:10}
.calib-status{color:#9fb0d0;font-size:15px}

/* ════ 4. 측정 ════ */
#measure{background:#e8edf5}
.measure-stage{flex:1;overflow:hidden;display:flex}
.measure-split{display:flex;width:100%;height:100%;overflow:hidden}
.measure-left{width:60%;overflow-y:auto;background:#fff;padding:44px 56px;border-right:2px solid #dde3ec}
.measure-left .pg-label{font-size:12px;font-weight:700;color:#b0bac9;letter-spacing:.8px;text-transform:uppercase;margin-bottom:20px}
.measure-left p{font-size:16px;line-height:2.2;color:#1a1a1a;margin-bottom:14px;text-align:justify}
.measure-right{width:40%;background:#f6f8fc;padding:32px 36px 100px;overflow-y:auto}
.measure-q{font-size:15px;font-weight:800;color:#11203b;margin-bottom:16px;line-height:1.5}
.opt-item{font-size:14px;line-height:1.6;padding:12px 16px;border-radius:10px;border:2.5px solid #e0e4ec;cursor:pointer;margin-bottom:9px;background:#fff;transition:border-color .12s,background .12s,color .12s;display:block;width:100%;text-align:left;font-family:inherit}
.opt-item:hover{border-color:#9dbce8;background:#f0f5ff}
.opt-item.selected{border-color:#2e9b56;background:#e9f7ec;color:#1a5c35;font-weight:700}
/* 플로팅 화살표 (페이지 이동 / 완료 — 시선 앵커 역할) */
.float-nav,.float-done{position:fixed;right:22px;bottom:22px;z-index:60;background:none;border:none;color:#1a56b0;font-size:36px;cursor:pointer;padding:6px;line-height:1;opacity:.5;transition:opacity .15s;font-family:inherit}
.float-nav:hover,.float-done:hover{opacity:1}
.float-nav:active,.float-done:active{opacity:.7}
.float-done{display:none}
/* 시선 후보정 앵커 오버레이 */
.anchor-overlay{position:fixed;inset:0;background:#e8edf5;z-index:200;pointer-events:none}
.anchor-dot{position:fixed;width:10px;height:10px;border-radius:50%;background:#e04848;transform:translate(-50%,-50%);transition:left 1s cubic-bezier(.4,0,.2,1),top 1s cubic-bezier(.4,0,.2,1);z-index:201}
/* 카운트다운 배지 */
.countdown-badge{position:fixed;top:16px;right:20px;z-index:80;background:#e04848;color:#fff;border-radius:50%;width:52px;height:52px;display:none;align-items:center;justify-content:center;font-size:22px;font-weight:800;box-shadow:0 4px 14px rgba(224,72,72,.4);animation:cdPulse .9s infinite}
@keyframes cdPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
/* 모의 시선 커서 */
.gaze{position:fixed;width:46px;height:46px;border-radius:50%;border:3px solid rgba(91,155,255,.8);background:rgba(91,155,255,.18);transform:translate(-50%,-50%);pointer-events:none;z-index:50;transition:transform .06s linear;display:none}
/* 읽기유형 유사도 바 */
.rtype-row{display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:10px}
.rtype-label{width:64px;flex-shrink:0;color:#5a6678;font-weight:600}
.rtype-bar-wrap{flex:1;height:10px;background:#e6e9ef;border-radius:5px;overflow:hidden}
.rtype-bar{height:100%;border-radius:5px}
.rtype-pct{width:36px;text-align:right;font-weight:700;color:#11203b;font-size:14px}

/* ════ 5/6. 결과 · 완료 ════ */
.result-card{background:#fff;border-radius:20px;padding:44px;max-width:560px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.1);text-align:center}
.result-check{width:84px;height:84px;border-radius:50%;background:#e9f7ec;color:#2e9b56;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 18px}
.result-title{font-size:26px;font-weight:800;color:#11203b}
.result-sub{font-size:15px;color:#7a8699;margin-top:8px;margin-bottom:26px}
.result-stats{display:flex;gap:12px;margin-bottom:30px}
.rstat{flex:1;background:#f6f8fc;border-radius:12px;padding:16px 12px}
.rstat .v{font-size:22px;font-weight:800;color:#1a56b0}
.rstat .l{font-size:12px;color:#8492a6;margin-top:3px}
.result-btns{display:flex;gap:12px}
.sent-toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:#11203b;color:#fff;padding:14px 28px;border-radius:30px;font-size:15px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.sent-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- 시선 후보정 앵커 -->
<div class="anchor-overlay" id="anchorOverlay" style="display:none"></div>
<div class="anchor-dot" id="anchorDot" style="display:none"></div>
<!-- 모의 시선 커서 / 토스트 / 뒤로가기 -->
<div class="gaze" id="gaze"></div>
<div class="sent-toast" id="toast">✓ 측정 결과가 전송되었습니다</div>
<button class="backbtn hidden" id="backBtn" onclick="goBack()">‹ 뒤로</button>

<!-- ════ 1. 로그인 ════ -->
<div class="screen active" id="login">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-title">PSAT 문제 탐색<br><span class="accent">고도화 트레이너</span></div>
      <div class="brand-sub">시선 기반 읽기 전략 측정 시스템</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label>기관 / 그룹</label>
        <select id="loginGroup">
          <option value="">선택하세요</option>
          <option>리더스아이 연구센터</option>
          <option>강남 학습센터</option>
          <option>분당 영재교육원</option>
          <option>온라인 1기</option>
        </select>
      </div>
      <div class="field">
        <label>아이디</label>
        <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="off">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호 입력">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">시작하기</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>
</div>

<!-- ════ 2. 기능선택 ════ -->
<div class="screen" id="function">
  <div class="body">
    <div style="text-align:center;margin-bottom:36px">
      <div class="title-xl" style="font-size:38px">무엇을 하시겠어요?</div>
    </div>
    <div class="text-grid" style="max-width:340px">
      <div class="text-card" onclick="goSelect()">
        <div class="tc-head">
          <span class="tc-icon">🎯</span>
          <span class="tc-badge diag">측정</span>
        </div>
        <div class="tc-title">TPAS</div>
        <div class="tc-meta">시선 기반 읽기 전략 측정<br>Text Pattern Analysis System</div>
        <div class="tc-go">선택하고 계속 ›</div>
      </div>
    </div>
  </div>
</div>

<!-- ════ 3. 글선택 ════ -->
<div class="screen" id="select">
  <div class="body">
    <div style="text-align:center;margin-bottom:28px">
      <div class="title-xl">측정할 글을 선택하세요</div>
    </div>
    <div class="text-grid" id="textGrid"></div>
  </div>
</div>

<!-- 글 선택 모달 -->
<div class="modal-bg" id="textModal">
  <div class="modal">
    <button class="modal-x" onclick="closeTextModal()">✕</button>
    <div class="modal-icon" id="mdIcon">📘</div>
    <div><span class="modal-badge diag" id="mdBadge">진단</span></div>
    <div class="modal-title" id="mdTitle">—</div>
    <div class="modal-conds" id="mdConds"></div>
    <button class="btn btn-primary btn-lg" onclick="startFromModal()">시작하기</button>
  </div>
</div>

<!-- ════ 4. 캘리브레이션 ════ -->
<div class="screen" id="calib">
  <div class="calib-stage" id="calibStage">
    <div class="calib-msg" id="calibMsg">
      <div class="h">시선 보정 (캘리브레이션)</div>
      <div class="p">화면에 나타나는 파란 점을 차례로 응시하세요.<br>편안한 자세로 화면과 약 60cm 거리를 유지해 주세요.</div>
    </div>
  </div>
  <div class="calib-bar" id="calibBar" style="display:none">
    <span class="calib-status" id="calibStatus">보정 준비 완료</span>
    <button class="btn btn-ghost" onclick="runCalibration()">다시 보정</button>
    <button class="btn btn-primary" onclick="startMeasureFlow()">시작하기</button>
  </div>
</div>

<!-- ════ 5. 측정 ════ -->
<div class="screen" id="measure">
  <div class="measure-stage" id="measureStage"></div>
  <div class="countdown-badge" id="countdownBadge">5</div>
  <button class="float-nav" id="floatNav" onclick="advancePage()">›</button>
  <button class="float-done" id="floatDone" onclick="advancePage()">›</button>
</div>

<!-- ════ 6. 결과 + 완료 (통합) ════ -->
<div class="screen" id="result">
  <div class="body">
    <div class="result-card">
      <div class="result-check" style="background:#e3f0ff;color:#1a56b0;font-size:40px">🎉</div>
      <div class="result-title">측정 완료</div>
      <div class="result-sub" id="resultSub">—</div>
      <div class="result-stats">
        <div class="rstat"><div class="v" id="rsTime">0:00</div><div class="l">측정 시간</div></div>
        <div class="rstat"><div class="v" id="rsCorrect">—</div><div class="l">정답률</div></div>
        <div class="rstat"><div class="v" id="rsProg">—</div><div class="l">페이지</div></div>
      </div>
      <div style="text-align:left;margin-bottom:28px">
        <div style="font-size:13px;font-weight:700;color:#5a6678;margin-bottom:10px">읽기유형별 유사도</div>
        <div id="rtypeList"></div>
      </div>
      <div class="result-btns">
        <button class="btn btn-primary btn-lg" style="flex:2" id="sendBtn" onclick="sendResult()">📱 핸드폰으로 결과 보내기</button>
        <button class="btn btn-ghost btn-lg" style="flex:1" onclick="goSelect()">완료</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// 데이터
// ════════════════════════════════════════
const TEXTS = [
  {
    id:'t1', type:'진단',
    title:'신뢰 기반의 제도와 사회적 비용',
    meta:'2페이지',
    level:6, subject:'사회', format:'설명', qtype:'일치부합',
    time:'제한 없음',
    trait:'사회과학 지문 + 일치·부합 문항. 지문과 발문·선택지를 오가는 탐색 전략을 측정합니다.',
    correct: 2,
    pages:[
      [
        '사회적 신뢰는 제도의 작동을 떠받치는 보이지 않는 기반이다. 사람들이 규칙을 지킬 것이라는 기대가 충분히 공유될 때, 제도는 적은 비용으로도 안정적으로 유지된다.',
        '반대로 신뢰가 무너지면 동일한 규칙이라도 이를 강제하기 위한 감시와 처벌 비용이 급격히 증가한다. 즉 제도의 효율성은 규칙 그 자체보다 그것을 둘러싼 신뢰의 두께에 더 크게 좌우된다.',
      ],
      [
        '따라서 어떤 제도를 평가할 때에는 명시된 규정뿐 아니라, 그 규정이 사람들 사이에서 실제로 어느 정도 신뢰를 형성하고 있는지를 함께 살펴야 한다.',
        '신뢰가 높은 사회에서는 법의 집행 없이도 자발적 규범 준수가 이루어지며, 이는 사회 전체의 거래 비용을 현저히 낮추는 효과를 가져온다. 이러한 사회적 자본으로서의 신뢰는 경제 성장과도 밀접한 관련이 있다.',
      ]
    ],
    question:{
      q:'윗글의 내용과 부합하는 것은?',
      opts:[
        '① 제도의 효율성은 규칙의 정교함에 의해서만 결정된다.',
        '② 신뢰가 무너지면 규칙 강제 비용이 줄어든다.',
        '③ 제도 평가에는 규정과 함께 신뢰의 정도를 고려해야 한다.',
        '④ 사회적 신뢰는 제도와 무관하게 형성된다.',
        '⑤ 감시와 처벌은 신뢰를 직접 증가시킨다.'
      ]
    }
  },
  {
    id:'t2', type:'훈련',
    title:'빛의 산란과 하늘의 색',

// ════════════════════════════════════════
// 상태
// ════════════════════════════════════════
let session = { name:'', group:'' };
let curText = null;
let curPageIdx = 0;
let docStart = 0;
let lastDocSec = 0;
let totalElapsed = 0;
let selectedOpt = undefined;  // 선택한 선택지 인덱스
let pageWaitTimer = null;
let countdownTimer = null;

// 뒤로가기 버튼이 보이는 화면
const BACK_SCREENS = new Set(['function', 'select']);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('backBtn').classList.toggle('hidden', !BACK_SCREENS.has(id));
}

function goBack() {
  const active = document.querySelector('.screen.active').id;
  if (active === 'function') backToLogin();
  else if (active === 'select') goFunction();
}
function backToLogin() {
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
  showScreen('login');
}
function fmtT(sec) {
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}

// ════════════════════════════════════════
// 1. 로그인
// ════════════════════════════════════════
function doLogin() {
  const group = document.getElementById('loginGroup').value;
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value.trim();
  const err = document.getElementById('loginErr');
  if (!group) { err.textContent = '기관/그룹을 선택하세요.'; return; }
  if (!id)    { err.textContent = '아이디를 입력하세요.'; return; }
  if (!pw)    { err.textContent = '비밀번호를 입력하세요.'; return; }
  err.textContent = '';
  session.name = id;
  session.group = group;
  goFunction();
}

// ════════════════════════════════════════
// 2. 기능선택
// ════════════════════════════════════════
function goFunction() {
  showScreen('function');
}

// ════════════════════════════════════════
// 3. 글선택 + 모달
// ════════════════════════════════════════
function goSelect() {
  curText = null;
  const grid = document.getElementById('textGrid');
  grid.innerHTML = TEXTS.map(t => `
    <div class="text-card" onclick="selectText('${t.id}')">
      <div class="tc-head">
        <span class="tc-badge ${t.type==='진단'?'diag':'train'}">${t.type}</span>
        <span class="tc-meta" style="margin:0">${t.meta}</span>
      </div>
      <div class="tc-title">${t.title}</div>
      <div class="tc-tags">
        <span class="tc-tag lv">Lv.${t.level}</span>
        <span class="tc-tag subj">${t.subject}</span>
        <span class="tc-tag fmt">${t.format}</span>
        <span class="tc-tag qt">${t.qtype}</span>
      </div>
    </div>`).join('');
  showScreen('select');
}
function selectText(id) {
  curText = TEXTS.find(t => t.id === id);
  // 모달 채우기
  document.getElementById('mdIcon').textContent = curText.icon;
  document.getElementById('mdTitle').textContent = curText.title;
  const badge = document.getElementById('mdBadge');
  badge.textContent = curText.type;
  badge.className = 'modal-badge ' + (curText.type === '진단' ? 'diag' : 'train');
  document.getElementById('mdConds').innerHTML = `
    <div class="cond-row"><span class="cond-k">제한 시간</span><span class="cond-v">${curText.time}</span></div>
    <div class="cond-row"><span class="cond-k">구성</span><span class="cond-v">${curText.pages.length}페이지</span></div>
    <div class="cond-row"><span class="cond-k">글 특성</span><span class="cond-v">${curText.trait}</span></div>`;
  document.getElementById('textModal').classList.add('open');
}
function closeTextModal() {
  document.getElementById('textModal').classList.remove('open');
}
function startFromModal() {
  closeTextModal();
  curPageIdx = 0; totalElapsed = 0; selectedOpt = undefined;
  goCalib();
}

// ════════════════════════════════════════
// 4. 캘리브레이션 (5점)
// ════════════════════════════════════════
const CALIB_POINTS = [[50,50],[12,12],[88,12],[12,88],[88,88]];
function goCalib() {
  showScreen('calib');
  runCalibration();
}
function runCalibration() {
  const stage = document.getElementById('calibStage');
  const msg = document.getElementById('calibMsg');
  const status = document.getElementById('calibStatus');
  stage.querySelectorAll('.calib-dot').forEach(d => d.remove());
  msg.style.display = 'none';
  document.getElementById('calibBar').style.display = 'none';
  status.textContent = '보정 중…';

  let i = 0;
  const dot = document.createElement('div');
  dot.className = 'calib-dot live';
  dot.innerHTML = '<div class="inner"></div>';
  stage.appendChild(dot);

  function place() {
    if (i >= CALIB_POINTS.length) {
      dot.remove();
      msg.style.display = '';
      msg.querySelector('.h').textContent = '보정 완료 ✓';
      msg.querySelector('.p').innerHTML = '준비가 되었습니다.<br>아래 <b>시작하기</b> 버튼을 누르면 측정이 시작됩니다.';
      status.textContent = '보정 완료 — 시작할 수 있습니다';
      document.getElementById('calibBar').style.display = '';
      return;
    }
    const [x, y] = CALIB_POINTS[i];
    dot.style.left = x + '%';
    dot.style.top  = y + '%';
    status.textContent = `보정 중… (${i+1}/${CALIB_POINTS.length})`;
    i++;
    setTimeout(place, 700);
  }
  place();
}

// ════════════════════════════════════════
// 5. 측정
// ════════════════════════════════════════
function startMeasureFlow() {
  curPageIdx = 0;
  docStart = Date.now();
  showScreen('measure');
  document.getElementById('gaze').style.display = 'block';
  runAnchor(() => {
    renderMeasurePage();
    startPageTimer();
  });
}

function runAnchor(onDone) {
  const overlay = document.getElementById('anchorOverlay');
  const dot = document.getElementById('anchorDot');

  // 오버레이 + 중앙에 점 표시
  overlay.style.display = 'block';
  dot.style.display = 'block';
  dot.style.transition = 'none';
  dot.style.left = '50%';
  dot.style.top = '50%';
  dot.style.opacity = '1';

  // 약간의 딜레이 후 우측 상단으로 이동 (1초)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    dot.style.transition = 'left 2s cubic-bezier(.4,0,.2,1), top 2s cubic-bezier(.4,0,.2,1)';
    dot.style.left = '6%';
    dot.style.top = '5%';

    // 이동 완료 후 3번 깜박 (1초)
    setTimeout(() => {
      let count = 0;
      const blink = setInterval(() => {
        count++;
        dot.style.opacity = count % 2 === 0 ? '1' : '0';
        if (count >= 6) {
          clearInterval(blink);
          dot.style.display = 'none';
          overlay.style.display = 'none';
          onDone();
        }
      }, 167);
    }, 2000);
  }));
}

function renderMeasurePage() {
  const text = curText;
  const pageParas = text.pages[curPageIdx];
  const isLast = curPageIdx === text.pages.length - 1;
  const passHtml = pageParas.map(p => `<p>${p}</p>`).join('');
  const optsHtml = text.question.opts.map((o, i) =>
    `<button class="opt-item" id="opt_${i}" onclick="selectOpt(${i})">${o}</button>`
  ).join('');

  document.getElementById('measureStage').innerHTML = `
    <div class="measure-split">
      <div class="measure-left">
        <div class="pg-label">${text.title} &nbsp;·&nbsp; ${curPageIdx+1} / ${text.pages.length}</div>
        ${passHtml}
      </div>
      <div class="measure-right">
        <div class="measure-q">${text.question.q}</div>
        ${optsHtml}
      </div>
    </div>`;

  if (selectedOpt !== undefined) {
    document.getElementById(`opt_${selectedOpt}`)?.classList.add('selected');
  }

  // 마지막 페이지: 완료버튼, 아니면 화살표
  document.getElementById('floatNav').style.display  = isLast ? 'none' : 'flex';
  document.getElementById('floatDone').style.display = isLast ? 'block' : 'none';
}

function selectOpt(idx) {
  document.querySelectorAll('.opt-item').forEach(el => el.classList.remove('selected'));
  document.getElementById(`opt_${idx}`).classList.add('selected');
  selectedOpt = idx;
}

// ── 페이지 타이머 (5초 대기 → 5초 카운트다운 → 자동 진행)
function startPageTimer() {
  clearPageTimers();
  const badge = document.getElementById('countdownBadge');
  badge.style.display = 'none';

  pageWaitTimer = setTimeout(() => {
    let val = 5;
    badge.textContent = val;
    badge.style.display = 'flex';
    countdownTimer = setInterval(() => {
      val--;
      badge.textContent = val;
      if (val <= 0) {
        clearInterval(countdownTimer);
        countdownTimer = null;
        advancePage();
      }
    }, 1000);
  }, 5000);
}

function clearPageTimers() {
  if (pageWaitTimer)  { clearTimeout(pageWaitTimer);   pageWaitTimer = null; }
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.getElementById('countdownBadge').style.display = 'none';
}

function advancePage() {
  clearPageTimers();
  if (curPageIdx < curText.pages.length - 1) {
    curPageIdx++;
    renderMeasurePage();
    startPageTimer();
  } else {
    finishMeasure();
  }
}

function finishMeasure() {
  clearPageTimers();
  lastDocSec = Math.floor((Date.now() - docStart) / 1000);
  totalElapsed += lastDocSec;
  document.getElementById('gaze').style.display = 'none';
  goResult();
}

// 모의 시선 커서 (측정 화면에서만)
document.addEventListener('mousemove', e => {
  const g = document.getElementById('gaze');
  if (g.style.display === 'block') {
    g.style.left = e.clientX + 'px';
    g.style.top = e.clientY + 'px';
  }
});

// ════════════════════════════════════════
// 6. 결과 (글 1개)
// ════════════════════════════════════════
const DUMMY_RTYPE = [
  [72, 58, 85],
  [61, 79, 44],
  [88, 52, 67],
];
const RTYPE_META = [
  { label:'구조읽기', color:'#1a56b0' },
  { label:'순차읽기', color:'#2e9b56' },
  { label:'탐색읽기', color:'#e65100' },
];

function goResult() {
  const isCorrect = selectedOpt === curText.correct;
  const pct = selectedOpt === undefined ? null : (isCorrect ? 100 : 0);

  document.getElementById('resultSub').textContent = `${session.name} 님의 "${curText.title}" 측정이 끝났습니다.`;
  document.getElementById('rsTime').textContent = fmtT(lastDocSec);
  document.getElementById('rsProg').textContent = curText.pages.length + '페이지';

  const corrEl = document.getElementById('rsCorrect');
  if (pct === null) {
    corrEl.textContent = '—';
    corrEl.style.color = '#8492a6';
  } else {
    corrEl.textContent = pct + '%';
    corrEl.style.color = pct === 100 ? '#2e9b56' : '#e04848';
  }

  const vals = DUMMY_RTYPE[0];
  document.getElementById('rtypeList').innerHTML = RTYPE_META.map((m, i) => `
    <div class="rtype-row">
      <span class="rtype-label">${m.label}</span>
      <div class="rtype-bar-wrap"><div class="rtype-bar" style="width:${vals[i]}%;background:${m.color}"></div></div>
      <span class="rtype-pct">${vals[i]}%</span>
    </div>`).join('');

  const btn = document.getElementById('sendBtn');
  btn.disabled = false;
  btn.textContent = '📱 핸드폰으로 결과 보내기';
  showScreen('result');
}
function sendResult() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '전송 완료 ✓';
  setTimeout(() => {
    toast.classList.remove('show');
  }, 1800);
}

// 엔터로 로그인
document.getElementById('loginPw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
